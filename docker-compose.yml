services:
  expo-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: smashnotes-expo-web
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
    command: npm run web -- --host lan --port 19006
    ports:
      - "19006:19006"
      - "8081:8081"
    volumes:
      - ./:/app
      - smashnotes_node_modules:/app/node_modules

volumes:
  smashnotes_node_modules: