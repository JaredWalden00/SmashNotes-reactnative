services:
  expo-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: smashnotes-expo-web
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
    command: npx expo start --web --host lan --port 8081
    ports:
      - "8081:8081"
    volumes:
      - ./:/app
      - smashnotes_node_modules:/app/node_modules
    depends_on:
      - node-server

  node-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smashnotes-node-server
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    ports:
      - "3001:3001"
    working_dir: /app
    command: node server.js
    volumes:
      - ./server:/app
      - smashnotes_server_node_modules:/app/node_modules

volumes:
  smashnotes_node_modules:
  smashnotes_server_node_modules:
