<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rich Text Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .editor-container {
      width: 100%;
      max-width: 800px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
      height: fit-content;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      padding: 8px 12px;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
      align-items: center;
    }

    .toolbar-group {
      display: flex;
      gap: 2px;
      align-items: center;
    }

    .toolbar-group + .toolbar-group {
      margin-left: 4px;
      padding-left: 8px;
      border-left: 1px solid #e0e0e0;
    }

    .toolbar button {
      width: 34px;
      height: 34px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      color: #444;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .toolbar button:hover {
      background: #e8e8e8;
    }

    .toolbar button.active {
      background: #dbeafe;
      color: #2563eb;
    }

    .toolbar select {
      height: 34px;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 0 8px;
      font-size: 13px;
      color: #444;
      background: #fff;
      cursor: pointer;
      outline: none;
    }

    .toolbar select:hover {
      border-color: #bbb;
    }

    .toolbar input[type="color"] {
      width: 34px;
      height: 34px;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 3px;
      cursor: pointer;
      background: #fff;
    }

    .editor {
      min-height: 400px;
      padding: 24px 32px;
      outline: none;
      font-size: 16px;
      line-height: 1.7;
      color: #1a1a1a;
    }

    .editor:empty::before {
      content: "Start typing here...";
      color: #aaa;
      pointer-events: none;
    }

    .editor h1 { font-size: 2em; margin: 0.4em 0; }
    .editor h2 { font-size: 1.5em; margin: 0.4em 0; }
    .editor h3 { font-size: 1.17em; margin: 0.4em 0; }
    .editor blockquote {
      border-left: 4px solid #2563eb;
      padding: 8px 16px;
      margin: 12px 0;
      background: #f8fafc;
      color: #555;
    }
    .editor pre {
      background: #1e293b;
      color: #e2e8f0;
      padding: 16px;
      border-radius: 8px;
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      overflow-x: auto;
      margin: 12px 0;
    }
    .editor ul, .editor ol { padding-left: 24px; margin: 8px 0; }
    .editor a { color: #2563eb; }
    .editor img { max-width: 100%; border-radius: 8px; margin: 8px 0; }
    .editor hr {
      border: none;
      border-top: 2px solid #e5e7eb;
      margin: 20px 0;
    }
    .editor table {
      border-collapse: collapse;
      width: 100%;
      margin: 12px 0;
    }
    .editor td, .editor th {
      border: 1px solid #d1d5db;
      padding: 8px 12px;
      text-align: left;
    }
    .editor th { background: #f3f4f6; font-weight: 600; }

    .status-bar {
      display: flex;
      justify-content: space-between;
      padding: 8px 16px;
      background: #fafafa;
      border-top: 1px solid #e0e0e0;
      font-size: 12px;
      color: #888;
    }

    /* SVG icon sizing */
    .toolbar button svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>
  <div class="editor-container">
    <div class="toolbar">
      <div class="toolbar-group">
        <select id="formatBlock" title="Text style">
          <option value="p">Paragraph</option>
          <option value="h1">Heading 1</option>
          <option value="h2">Heading 2</option>
          <option value="h3">Heading 3</option>
          <option value="blockquote">Quote</option>
          <option value="pre">Code Block</option>
        </select>
        <select id="fontName" title="Font">
          <option value="sans-serif">Sans Serif</option>
          <option value="serif">Serif</option>
          <option value="monospace">Monospace</option>
          <option value="Georgia">Georgia</option>
          <option value="Verdana">Verdana</option>
        </select>
        <select id="fontSize" title="Font size">
          <option value="1">Small</option>
          <option value="3" selected>Normal</option>
          <option value="5">Large</option>
          <option value="7">Huge</option>
        </select>
      </div>

      <div class="toolbar-group">
        <button data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
        <button data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
        <button data-cmd="underline" title="Underline (Ctrl+U)"><u>U</u></button>
        <button data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
        <button data-cmd="subscript" title="Subscript" style="font-size:12px">X<sub>2</sub></button>
        <button data-cmd="superscript" title="Superscript" style="font-size:12px">X<sup>2</sup></button>
      </div>

      <div class="toolbar-group">
        <input type="color" id="foreColor" value="#000000" title="Text color">
        <input type="color" id="hiliteColor" value="#ffff00" title="Highlight color">
        <button id="highlightBtn" title="Highlight selection" style="font-size:18px; font-weight:bold; color:#f59e0b;">H</button>
      </div>

      <div class="toolbar-group">
        <button data-cmd="justifyLeft" title="Align left">
          <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
        </button>
        <button data-cmd="justifyCenter" title="Align center">
          <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
        </button>
        <button data-cmd="justifyRight" title="Align right">
          <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="6" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>

      <div class="toolbar-group">
        <button data-cmd="insertUnorderedList" title="Bullet list">
          <svg viewBox="0 0 24 24"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
        </button>
        <button data-cmd="insertOrderedList" title="Numbered list">
          <svg viewBox="0 0 24 24"><line x1="10" y1="6" x2="20" y2="6"/><line x1="10" y1="12" x2="20" y2="12"/><line x1="10" y1="18" x2="20" y2="18"/><text x="3" y="8" font-size="7" fill="currentColor" stroke="none" font-family="sans-serif">1</text><text x="3" y="14" font-size="7" fill="currentColor" stroke="none" font-family="sans-serif">2</text><text x="3" y="20" font-size="7" fill="currentColor" stroke="none" font-family="sans-serif">3</text></svg>
        </button>
        <button data-cmd="indent" title="Indent">
          <svg viewBox="0 0 24 24"><line x1="3" y1="4" x2="21" y2="4"/><line x1="11" y1="10" x2="21" y2="10"/><line x1="11" y1="16" x2="21" y2="16"/><line x1="3" y1="22" x2="21" y2="22"/><polyline points="3,8 7,13 3,18"/></svg>
        </button>
        <button data-cmd="outdent" title="Outdent">
          <svg viewBox="0 0 24 24"><line x1="3" y1="4" x2="21" y2="4"/><line x1="11" y1="10" x2="21" y2="10"/><line x1="11" y1="16" x2="21" y2="16"/><line x1="3" y1="22" x2="21" y2="22"/><polyline points="7,8 3,13 7,18"/></svg>
        </button>
      </div>

      <div class="toolbar-group">
        <button id="linkBtn" title="Insert link">
          <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </button>
        <button id="imageBtn" title="Insert image">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
        </button>
        <button id="tableBtn" title="Insert table">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
        </button>
        <button data-cmd="insertHorizontalRule" title="Horizontal rule">&mdash;</button>
      </div>

      <div class="toolbar-group">
        <button data-cmd="undo" title="Undo (Ctrl+Z)">
          <svg viewBox="0 0 24 24"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        </button>
        <button data-cmd="redo" title="Redo (Ctrl+Y)">
          <svg viewBox="0 0 24 24"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
        </button>
        <button data-cmd="removeFormat" title="Clear formatting">
          <svg viewBox="0 0 24 24"><line x1="4" y1="4" x2="20" y2="20"/><path d="M6 4h12l-6 14"/></svg>
        </button>
      </div>
    </div>

    <div class="editor" id="editor" contenteditable="true"></div>

    <div class="status-bar">
      <span id="wordCount">0 words</span>
      <span id="charCount">0 characters</span>
    </div>
  </div>

  <script>
    const editor = document.getElementById('editor');

    // Simple commands
    document.querySelectorAll('[data-cmd]').forEach(btn => {
      btn.addEventListener('mousedown', e => e.preventDefault());
      btn.addEventListener('click', () => {
        document.execCommand(btn.dataset.cmd, false, null);
        editor.focus();
        updateActiveStates();
      });
    });

    // Format block
    document.getElementById('formatBlock').addEventListener('change', function() {
      document.execCommand('formatBlock', false, `<${this.value}>`);
      editor.focus();
    });

    // Font name
    document.getElementById('fontName').addEventListener('change', function() {
      document.execCommand('fontName', false, this.value);
      editor.focus();
    });

    // Font size
    document.getElementById('fontSize').addEventListener('change', function() {
      document.execCommand('fontSize', false, this.value);
      editor.focus();
    });

    // Text color
    document.getElementById('foreColor').addEventListener('input', function() {
      document.execCommand('foreColor', false, this.value);
      editor.focus();
    });

    // Highlight
    document.getElementById('highlightBtn').addEventListener('click', () => {
      const color = document.getElementById('hiliteColor').value;
      document.execCommand('hiliteColor', false, color);
      editor.focus();
    });

    // Link
    document.getElementById('linkBtn').addEventListener('click', () => {
      const url = prompt('Enter URL:', 'https://');
      if (url) {
        document.execCommand('createLink', false, url);
        editor.focus();
      }
    });

    // Image
    document.getElementById('imageBtn').addEventListener('click', () => {
      const url = prompt('Enter image URL:', 'https://');
      if (url) {
        document.execCommand('insertImage', false, url);
        editor.focus();
      }
    });

    // Table
    document.getElementById('tableBtn').addEventListener('click', () => {
      const rows = prompt('Number of rows:', '3');
      const cols = prompt('Number of columns:', '3');
      if (rows && cols) {
        let table = '<table><thead><tr>';
        for (let c = 0; c < cols; c++) table += `<th>Header ${c+1}</th>`;
        table += '</tr></thead><tbody>';
        for (let r = 0; r < rows - 1; r++) {
          table += '<tr>';
          for (let c = 0; c < cols; c++) table += '<td>&nbsp;</td>';
          table += '</tr>';
        }
        table += '</tbody></table><p><br></p>';
        document.execCommand('insertHTML', false, table);
        editor.focus();
      }
    });

    // Active state tracking
    function updateActiveStates() {
      document.querySelectorAll('[data-cmd]').forEach(btn => {
        const cmd = btn.dataset.cmd;
        if (['bold','italic','underline','strikeThrough','subscript','superscript',
             'insertUnorderedList','insertOrderedList','justifyLeft','justifyCenter','justifyRight']
            .includes(cmd)) {
          btn.classList.toggle('active', document.queryCommandState(cmd));
        }
      });
    }

    // Word & character count
    function updateCounts() {
      const text = editor.innerText || '';
      const chars = text.length;
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      document.getElementById('wordCount').textContent = `${words} word${words !== 1 ? 's' : ''}`;
      document.getElementById('charCount').textContent = `${chars} character${chars !== 1 ? 's' : ''}`;
    }

    editor.addEventListener('input', () => { updateActiveStates(); updateCounts(); });
    editor.addEventListener('keyup', updateActiveStates);
    editor.addEventListener('mouseup', updateActiveStates);

    // Tab key inserts a tab in the editor
    editor.addEventListener('keydown', e => {
      if (e.key === 'Tab') {
        e.preventDefault();
        document.execCommand('insertText', false, '\t');
      }
    });

    updateCounts();
  </script>
</body>
</html>
